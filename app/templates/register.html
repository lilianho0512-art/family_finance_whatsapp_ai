<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <title>注册 — Family Finance AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container" style="max-width: 480px; margin-top: 60px;">
  <h3 class="mb-4">💰 创建家庭账户</h3>
  {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
  <form method="post" action="/register">
    <div class="mb-3"><label class="form-label">家庭名称</label>
      <input type="text" name="family_name" class="form-control" placeholder="陈氏一家" required></div>
    <div class="mb-3"><label class="form-label">管理员邮箱</label>
      <input type="email" name="email" class="form-control" required></div>
    <div class="mb-3"><label class="form-label">密码（至少 6 位）</label>
      <input type="password" name="password" class="form-control" minlength="6" required></div>
    <hr>
    <div class="mb-3"><label class="form-label">WhatsApp 号码（可选，国家码 + 号码，例 60123456789）</label>
      <input type="text" name="whatsapp_number" class="form-control" placeholder="60123456789"></div>
    <div class="mb-3"><label class="form-label">号码标签（可选，例 Dad / Mom）</label>
      <input type="text" name="label" class="form-control"></div>
    <button type="submit" class="btn btn-primary w-100">注册并登录</button>
  </form>
  <p class="mt-3 text-center">
    <a href="/login">已有账号？前往登录</a>
  </p>
</div>
</body>
</html>
