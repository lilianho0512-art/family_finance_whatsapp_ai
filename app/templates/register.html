<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Register — Family Finance AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container" style="max-width: 480px; margin-top: 60px;">
  <h3 class="mb-4">💰 Create a family account</h3>
  {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
  <form method="post" action="/register">
    <div class="mb-3"><label class="form-label">Family name</label>
      <input type="text" name="family_name" class="form-control" placeholder="The Smiths" required></div>
    <div class="mb-3"><label class="form-label">Admin email</label>
      <input type="email" name="email" class="form-control" required></div>
    <div class="mb-3"><label class="form-label">Password (at least 6 characters)</label>
      <input type="password" name="password" class="form-control" minlength="6" required></div>
    <hr>
    <div class="mb-3"><label class="form-label">WhatsApp number (optional, country code + number, e.g. 60123456789)</label>
      <input type="text" name="whatsapp_number" class="form-control" placeholder="60123456789"></div>
    <div class="mb-3"><label class="form-label">Number label (optional, e.g. Dad / Mom)</label>
      <input type="text" name="label" class="form-control"></div>
    <button type="submit" class="btn btn-primary w-100">Register and log in</button>
  </form>
  <p class="mt-3 text-center">
    <a href="/login">Already have an account? Log in</a>
  </p>
</div>
</body>
</html>
