<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ 'Edit loan' if loan else 'New loan' }} — Family Finance AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<nav class="navbar navbar-dark bg-primary mb-3">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">💰 Family Finance AI</a>
    <div>
      <a class="btn btn-outline-light btn-sm" href="/">Dashboard</a>
      <a class="btn btn-outline-light btn-sm" href="/loans">Loans</a>
      <a class="btn btn-outline-light btn-sm" href="/auth/logout">Logout</a>
    </div>
  </div>
</nav>
<div class="container" style="max-width: 720px;">
  <h3>{{ 'Edit' if loan else 'New' }} loan / payment plan</h3>
  <form method="post" action="{{ '/loans/' ~ loan.id if loan else '/loans' }}" class="row g-3">
    <div class="col-md-4">
      <label class="form-label">Kind</label>
      <select class="form-select" name="kind">
        <option value="loan" {% if loan and loan.kind == 'loan' %}selected{% endif %}>Loan</option>
        <option value="installment" {% if loan and loan.kind == 'installment' %}selected{% endif %}>Installment plan</option>
      </select>
    </div>
    <div class="col-md-8">
      <label class="form-label">Lender / merchant</label>
      <input class="form-control" name="lender" required value="{{ loan.lender if loan else '' }}" placeholder="Maybank Home Loan / Shopee SPayLater">
    </div>

    <div class="col-md-3">
      <label class="form-label">Currency</label>
      <select class="form-select" name="currency">
        {% for c in currencies %}
          <option value="{{ c }}"
            {% if loan and loan.currency == c %}selected
            {% elif not loan and family_currency == c %}selected
            {% endif %}>{{ c }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-3">
      <label class="form-label">Principal</label>
      <input type="number" step="0.01" class="form-control" name="principal" required value="{{ loan.principal if loan else '' }}">
    </div>
    <div class="col-md-3">
      <label class="form-label">Monthly payment</label>
      <input type="number" step="0.01" class="form-control" name="monthly_payment" required value="{{ loan.monthly_payment if loan else '' }}">
    </div>
    <div class="col-md-3">
      <label class="form-label">Current balance</label>
      <input type="number" step="0.01" class="form-control" name="current_balance" value="{{ loan.current_balance if loan else '' }}" placeholder="defaults to principal">
    </div>

    <div class="col-md-4">
      <label class="form-label">Interest rate (annual %)</label>
      <input type="number" step="0.01" class="form-control" name="interest_rate" value="{{ loan.interest_rate if loan and loan.interest_rate is not none else '' }}">
    </div>
    <div class="col-md-4">
      <label class="form-label">Term (months)</label>
      <input type="number" class="form-control" name="term_months" value="{{ loan.term_months if loan and loan.term_months else '' }}">
    </div>
    <div class="col-md-4">
      <label class="form-label">Payment due day (1–31)</label>
      <input type="number" min="1" max="31" class="form-control" name="payment_due_day" value="{{ loan.payment_due_day if loan and loan.payment_due_day else '' }}">
    </div>

    <div class="col-md-4">
      <label class="form-label">Start date</label>
      <input type="date" class="form-control" name="start_date" value="{{ loan.start_date.isoformat() if loan and loan.start_date else '' }}">
    </div>
    {% if loan %}
    <div class="col-md-4">
      <label class="form-label">Status</label>
      <select class="form-select" name="status">
        <option value="active" {% if loan.status == 'active' %}selected{% endif %}>Active</option>
        <option value="closed" {% if loan.status == 'closed' %}selected{% endif %}>Closed</option>
      </select>
    </div>
    {% endif %}

    <div class="col-12">
      <label class="form-label">Notes</label>
      <textarea class="form-control" name="notes" rows="2">{{ loan.notes if loan and loan.notes else '' }}</textarea>
    </div>

    <div class="col-12">
      <button class="btn btn-primary" type="submit">{{ 'Save changes' if loan else 'Create loan' }}</button>
      <a class="btn btn-outline-secondary" href="/loans">Cancel</a>
    </div>
  </form>
</div>
</body>
</html>
